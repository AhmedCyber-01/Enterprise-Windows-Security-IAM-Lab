<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">corp.local - Lab Network Architecture</text>

  <!-- Domain Controller -->
  <rect x="360" y="55" width="180" height="60" rx="6" fill="#2b579a" />
  <text x="450" y="80" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">DC01</text>
  <text x="450" y="98" font-size="11" fill="#e0e0e0" text-anchor="middle">Windows Server 2022</text>

  <!-- Line DC to OUs -->
  <line x1="450" y1="115" x2="450" y2="150" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="150" x2="760" y2="150" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="150" x2="140" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="380" y1="150" x2="380" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="530" y1="150" x2="530" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="760" y1="150" x2="760" y2="170" stroke="#555" stroke-width="1.5"/>

  <!-- OU boxes -->
  <g>
    <rect x="60" y="170" width="160" height="50" rx="6" fill="#4472c4"/>
    <text x="140" y="200" font-size="12" fill="#fff" text-anchor="middle">HR OU</text>
  </g>
  <g>
    <rect x="300" y="170" width="160" height="50" rx="6" fill="#4472c4"/>
    <text x="380" y="200" font-size="12" fill="#fff" text-anchor="middle">Finance OU</text>
  </g>
  <g>
    <rect x="450" y="170" width="160" height="50" rx="6" fill="#4472c4"/>
    <text x="530" y="200" font-size="12" fill="#fff" text-anchor="middle">IT OU</text>
  </g>
  <g>
    <rect x="680" y="170" width="160" height="50" rx="6" fill="#4472c4"/>
    <text x="760" y="200" font-size="12" fill="#fff" text-anchor="middle">Sales OU</text>
  </g>

  <!-- Security groups -->
  <line x1="140" y1="220" x2="140" y2="245" stroke="#555" stroke-width="1.5"/>
  <line x1="380" y1="220" x2="380" y2="245" stroke="#555" stroke-width="1.5"/>
  <line x1="530" y1="220" x2="530" y2="245" stroke="#555" stroke-width="1.5"/>
  <line x1="760" y1="220" x2="760" y2="245" stroke="#555" stroke-width="1.5"/>

  <rect x="45" y="245" width="190" height="55" rx="6" fill="#70ad47"/>
  <text x="140" y="267" font-size="11" fill="#fff" text-anchor="middle">HR_Read / HR_Modify</text>
  <text x="140" y="285" font-size="10" fill="#eaf5e5" text-anchor="middle">Shared HR Folder</text>

  <rect x="285" y="245" width="190" height="55" rx="6" fill="#70ad47"/>
  <text x="380" y="267" font-size="11" fill="#fff" text-anchor="middle">Finance_Read / Finance_Modify</text>
  <text x="380" y="285" font-size="10" fill="#eaf5e5" text-anchor="middle">Shared Finance Folder</text>

  <rect x="440" y="245" width="180" height="55" rx="6" fill="#ed7d31"/>
  <text x="530" y="267" font-size="11" fill="#fff" text-anchor="middle">IT_Admin</text>
  <text x="530" y="285" font-size="10" fill="#fbe5d6" text-anchor="middle">Full Control - all shares</text>

  <rect x="670" y="245" width="180" height="55" rx="6" fill="#70ad47"/>
  <text x="760" y="267" font-size="11" fill="#fff" text-anchor="middle">Sales_Read / Sales_Modify</text>
  <text x="760" y="285" font-size="10" fill="#eaf5e5" text-anchor="middle">Shared Sales Folder</text>

  <!-- Client -->
  <line x1="450" y1="115" x2="450" y2="400" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>
  <rect x="360" y="400" width="180" height="55" rx="6" fill="#7f7f7f"/>
  <text x="450" y="423" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">CLIENT01</text>
  <text x="450" y="440" font-size="10" fill="#e6e6e6" text-anchor="middle">Windows 10 - domain joined</text>

  <!-- Splunk -->
  <line x1="450" y1="115" x2="700" y2="480" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>
  <rect x="620" y="480" width="200" height="60" rx="6" fill="#d9534f"/>
  <text x="720" y="503" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Splunk Enterprise</text>
  <text x="720" y="521" font-size="10" fill="#fbe3e2" text-anchor="middle">Receives Security event logs</text>

  <text x="450" y="590" font-size="10" fill="#777" text-anchor="middle">All hosts are VirtualBox VMs on an internal (host-only) network - not exposed to the internet</text>
</svg>
